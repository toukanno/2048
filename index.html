<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { --bg:#faf3e8; --board:#b8a99a; --empty:rgba(180,160,140,0.35); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg);
    background-image:radial-gradient(ellipse at 50% 0%,rgba(237,180,100,0.15) 0%,transparent 60%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; font-family:'Nunito',sans-serif; padding:20px;
  }
  header {
    width:360px; display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:14px;
  }
  .logo { font-size:3.5em; font-weight:900; color:#776e65; line-height:1; }
  .logo span { display:block; font-size:0.28em; font-weight:700; color:#a89585; letter-spacing:1px; margin-top:2px; }
  .score-row { display:flex; gap:8px; }
  .score-box {
    background:linear-gradient(135deg,#b8a99a,#9e8e80); border-radius:8px; padding:8px 18px;
    text-align:center; color:white; box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  .score-box .label { font-size:0.65em; font-weight:800; letter-spacing:1.5px; opacity:0.85; }
  .score-box .val { font-size:1.6em; font-weight:900; line-height:1.1; }
  .score-box.gold { background:linear-gradient(135deg,#edc540,#d4a820); }
  .controls { width:360px; display:flex; gap:8px; margin-bottom:14px; }
  .btn {
    flex:1; padding:10px 0; border:none; border-radius:8px; font-family:'Nunito',sans-serif;
    font-weight:800; font-size:0.9em; cursor:pointer; transition:all 0.18s; letter-spacing:0.5px;
  }
  .btn-primary { background:linear-gradient(135deg,#f5956e,#e8743a); color:#fff; box-shadow:0 3px 10px rgba(232,116,58,0.35); }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 5px 14px rgba(232,116,58,0.4); }
  .btn-secondary { background:rgba(0,0,0,0.06); color:#776e65; }
  .btn-secondary:hover { background:rgba(0,0,0,0.1); }
  #board-wrap {
    background:var(--board);
    border-radius:14px; padding:12px; width:360px; height:360px;
    box-shadow:0 8px 24px rgba(0,0,0,0.18),0 2px 6px rgba(0,0,0,0.1);
    position:relative;
  }
  #board { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; width:100%; height:100%; }
  .cell { background:var(--empty); border-radius:8px; }
  .tile {
    border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:1.55em; transition:transform 0.07s ease;
    animation:appear 0.12s cubic-bezier(0.2,1.4,0.6,1);
    width:100%; height:100%;
  }
  @keyframes appear { from{transform:scale(0.4);opacity:0} to{transform:scale(1);opacity:1} }
  .merge-anim { animation:merge 0.18s cubic-bezier(0.2,1.6,0.6,1); }
  @keyframes merge { 0%{transform:scale(1)} 40%{transform:scale(1.22)} 100%{transform:scale(1)} }

  .t2   { background:#eee4da; color:#776e65; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
  .t4   { background:#ede0c8; color:#776e65; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
  .t8   { background:#f2b179; color:#fff; box-shadow:0 2px 8px rgba(242,177,121,0.4); }
  .t16  { background:#f59563; color:#fff; box-shadow:0 2px 8px rgba(245,149,99,0.4); }
  .t32  { background:#f67c5f; color:#fff; box-shadow:0 2px 10px rgba(246,124,95,0.45); }
  .t64  { background:#f65e3b; color:#fff; box-shadow:0 3px 12px rgba(246,94,59,0.5); font-size:1.3em; }
  .t128 { background:#edcf72; color:#fff; box-shadow:0 3px 14px rgba(237,207,114,0.5); font-size:1.15em; }
  .t256 { background:#edcc61; color:#fff; box-shadow:0 3px 14px rgba(237,204,97,0.5); font-size:1.15em; }
  .t512 { background:#edc850; color:#fff; box-shadow:0 3px 16px rgba(237,200,80,0.55); font-size:1.1em; }
  .t1024{ background:#edc53f; color:#fff; box-shadow:0 4px 18px rgba(237,197,63,0.6); font-size:0.95em; }
  .t2048{ background:linear-gradient(135deg,#edc22e,#f0a000); color:#fff; box-shadow:0 4px 20px rgba(237,194,46,0.65); font-size:0.9em; }
  .t4096{ background:#3c3a32; color:#fff; font-size:0.85em; }
  .t8192{ background:#3c3a32; color:#f65e3b; font-size:0.8em; }

  #msg {
    position:absolute; inset:0; border-radius:14px;
    background:rgba(248,240,230,0.88); display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; backdrop-filter:blur(6px);
  }
  #msg h2 { font-size:2.2em; font-weight:900; color:#776e65; }
  #msg .final-score { font-size:1.2em; font-weight:700; color:#a89585; }
  #msg .big-score { font-size:3em; font-weight:900; color:#f59563; line-height:1; }
  #msg .btn { padding:12px 36px; font-size:1em; }
  #info { margin-top:10px; font-size:0.8em; color:#b8a99a; text-align:center; }
</style>
</head>
<body>
<header>
  <div class="logo">2048<span>数字を合わせよう</span></div>
  <div class="score-row">
    <div class="score-box"><div class="label">SCORE</div><div class="val" id="score">0</div></div>
    <div class="score-box gold"><div class="label">BEST</div><div class="val" id="best">0</div></div>
  </div>
</header>

<div class="controls">
  <button class="btn btn-primary" onclick="newGame()">新しいゲーム</button>
  <button class="btn btn-secondary" id="undoBtn" onclick="undo()" disabled>↩ 戻す</button>
</div>

<div id="board-wrap">
  <div id="board"></div>
  <div id="msg">
    <h2 id="msgTitle"></h2>
    <div class="final-score" id="msgSub"></div>
    <div class="big-score" id="msgScore"></div>
    <button class="btn btn-primary" onclick="newGame()">もう一度</button>
    <button class="btn btn-secondary" id="contBtn" onclick="continueGame()" style="display:none">続ける</button>
  </div>
</div>

<div id="info">↑↓←→ または WASD で操作 · スワイプ対応</div>

<script>
const SIZE=4;
let grid=[],score=0,best=0,won=false,over=false,prevState=null;

function newGame(){
  grid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score=0; won=false; over=false; prevState=null;
  document.getElementById('msg').style.display='none';
  document.getElementById('undoBtn').disabled=true;
  addTile(); addTile(); render();
}

function saveState(){prevState={grid:grid.map(r=>[...r]),score};}

function undo(){
  if(!prevState)return;
  grid=prevState.grid; score=prevState.score; prevState=null;
  document.getElementById('undoBtn').disabled=true;
  render();
}

function addTile(){
  const empty=[];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!grid[r][c]) empty.push([r,c]);
  if(!empty.length) return false;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.88?2:4; return true;
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    const v=grid[r][c];
    const div=document.createElement('div');
    div.className=v?`tile t${Math.min(v,8192)}`:'cell';
    if(v) div.textContent=v;
    board.appendChild(div);
  }
  document.getElementById('score').textContent=score;
  best=Math.max(best,score);
  document.getElementById('best').textContent=best;
}

function move(dir){
  if(over) return;
  saveState();
  let moved=false;
  const use=dir==='left'||dir==='right'?grid:transpose(grid);
  const rev=dir==='right'||dir==='down';
  for(let r=0;r<SIZE;r++){
    let row=use[r].filter(v=>v);
    if(rev) row.reverse();
    for(let i=0;i<row.length-1;i++){
      if(row[i]===row[i+1]){
        row[i]*=2; score+=row[i]; row.splice(i+1,1);
        if(row[i]===2048&&!won){won=true;showMsg('🎉 2048 達成！','おめでとうございます！',score,true);}
      }
    }
    while(row.length<SIZE) row.push(0);
    if(rev) row.reverse();
    if(use[r].join()!==row.join()) moved=true;
    use[r]=row;
  }
  grid=dir==='left'||dir==='right'?use:transpose(use);
  if(moved){addTile();render();checkOver();}
  else{prevState=null;}
  document.getElementById('undoBtn').disabled=!prevState;
}

function transpose(g){return Array.from({length:SIZE},(_,r)=>Array.from({length:SIZE},(_,c)=>g[c][r]));}

function checkOver(){
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    if(!grid[r][c]) return;
    if(c<SIZE-1&&grid[r][c]===grid[r][c+1]) return;
    if(r<SIZE-1&&grid[r][c]===grid[r+1][c]) return;
  }
  over=true; showMsg('ゲームオーバー','お疲れ様でした',score,false);
}

function showMsg(title,sub,sc,cont){
  document.getElementById('msgTitle').textContent=title;
  document.getElementById('msgSub').textContent=sub;
  document.getElementById('msgScore').textContent=sc;
  document.getElementById('contBtn').style.display=cont?'block':'none';
  document.getElementById('msg').style.display='flex';
}

function continueGame(){document.getElementById('msg').style.display='none';}

document.addEventListener('keydown',e=>{
  const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right'};
  if(m[e.key]){move(m[e.key]);e.preventDefault();}
});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left'); else move(dy>0?'down':'up');
},{passive:true});

newGame();
</script>
</body>
</html>
